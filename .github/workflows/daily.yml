name: Daily AI Digest Email

on:
  schedule:
    - cron: "0 23 * * *"   # 08:00 JST
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show workspace (debug)
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          pwd
          ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd "$GITHUB_WORKSPACE"
          pip install -r "$GITHUB_WORKSPACE/requirements.txt"

      - name: Run digest and send email
        env:
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_SMTP_AUTH_CODE: ${{ secrets.QQ_SMTP_AUTH_CODE }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: |
          cd "$GITHUB_WORKSPACE"
          python "$GITHUB_WORKSPACE/daily_ai_digest.py"
